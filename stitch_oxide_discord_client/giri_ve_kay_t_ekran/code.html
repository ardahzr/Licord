<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Better-VC - Login / Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#661600",
                        "on-primary-container": "#641800",
                        "secondary-container": "#3e4b51",
                        "error": "#ffb4ab",
                        "on-error-container": "#ffdad6",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-bright": "#393939",
                        "on-secondary-fixed": "#101d23",
                        "on-tertiary": "#601400",
                        "outline": "#a88a82",
                        "primary-fixed-dim": "#ffb59f",
                        "surface-dim": "#131313",
                        "surface-tint": "#ffb59f",
                        "secondary": "#bbc9d0",
                        "on-primary": "#5e1600",
                        "on-primary-fixed": "#3a0a00",
                        "tertiary-fixed-dim": "#ffb5a0",
                        "tertiary-container": "#ff7048",
                        "on-background": "#e5e2e1",
                        "inverse-surface": "#e5e2e1",
                        "surface-variant": "#353534",
                        "surface-container": "#201f1f",
                        "on-primary-fixed-variant": "#852300",
                        "on-secondary-container": "#adbbc2",
                        "secondary-fixed": "#d7e5ec",
                        "surface": "#131313",
                        "on-error": "#690005",
                        "primary-fixed": "#ffdbd0",
                        "inverse-on-surface": "#313030",
                        "surface-container-low": "#1c1b1b",
                        "primary": "#ffb59f",
                        "on-tertiary-fixed-variant": "#872000",
                        "outline-variant": "#59413a",
                        "tertiary": "#ffb5a0",
                        "on-secondary-fixed-variant": "#3c494f",
                        "surface-container-highest": "#353534",
                        "inverse-primary": "#ac3509",
                        "error-container": "#93000a",
                        "surface-container-high": "#2a2a2a",
                        "on-surface": "#e5e2e1",
                        "background": "#131313",
                        "secondary-fixed-dim": "#bbc9d0",
                        "on-surface-variant": "#e0bfb6",
                        "tertiary-fixed": "#ffdbd1",
                        "on-secondary": "#253238",
                        "primary-container": "#ff7043",
                        "on-tertiary-fixed": "#3b0900"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "container-max": "1440px",
                        "gutter": "16px",
                        "xs": "4px",
                        "xl": "40px",
                        "sm": "8px",
                        "lg": "24px",
                        "unit": "4px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "label-caps": ["JetBrains Mono"],
                        "display-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "code-sm": ["JetBrains Mono"],
                        "body-lg": ["Inter"],
                        "headline-md-mobile": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["11px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "code-sm": ["13px", { "lineHeight": "18px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md-mobile": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .terminal-bg {
            background-image: 
                linear-gradient(rgba(19, 19, 19, 0.9), rgba(19, 19, 19, 0.9)),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 20px,
                    rgba(255, 112, 67, 0.03) 20px,
                    rgba(255, 112, 67, 0.03) 21px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 20px,
                    rgba(255, 112, 67, 0.03) 20px,
                    rgba(255, 112, 67, 0.03) 21px
                );
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }
        .input-focus-border:focus {
            border-color: #ff7043;
            outline: none;
            box-shadow: none;
        }
        .tab-active {
            border-bottom: 2px solid #ff7043;
            color: #ff7043;
        }
        .tab-inactive {
            border-bottom: 2px solid transparent;
            color: #a88a82;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center font-body-md terminal-bg p-md">
<div class="w-full max-w-md bg-surface-container-low border border-outline-variant rounded p-lg relative overflow-hidden">
<!-- Decoration -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container opacity-5 rounded-full blur-3xl -mr-16 -mt-16 pointer-events-none"></div>
<!-- Header / Branding -->
<div class="flex flex-col items-center mb-lg">
<img alt="Better-VC Logo" class="w-16 h-16 rounded-DEFAULT mb-md object-cover border border-outline-variant" src="https://lh3.googleusercontent.com/aida/AP1WRLvLAc9pw6QSbdV_yQr90OwPA17BkeY1RwqGK_2Cr__3er147n8ZXCrKkyjSad7slNUWJpd08KM0lVT7nypIH0fZ7d_ojfj64T_QERARN5YfNUOGep8BPoMhcBdHhhE_mdvACxa_prMDjp3yQ1A_wMOZ7gneRZcBSE8r7pnRGqVKhWVo8fx1u0dBB-IJHQ7EXwBHW-7xdu43laaFdCI1cuMN20-PmQDein2PoiXecwZYtKQqOZGZaASKzJQ"/>
<h1 class="font-headline-md text-headline-md text-on-surface">System.Access</h1>
<p class="font-code-sm text-code-sm text-on-surface-variant mt-sm">Authenticate to proceed.</p>
</div>
<!-- Tabs -->
<div class="flex border-b border-outline-variant mb-lg font-label-caps text-label-caps w-full">
<button class="flex-1 py-sm tab-active transition-colors duration-200" id="loginTab">
                LOGIN
            </button>
<button class="flex-1 py-sm tab-inactive hover:text-on-surface transition-colors duration-200" id="signupTab">
                SIGN UP
            </button>
</div>
<!-- Form Area -->
<form class="flex flex-col gap-md" id="authForm">
<div class="hidden" id="nameField">
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-xs" for="username">USERNAME</label>
<input class="w-full bg-surface-container-highest border border-outline-variant rounded-DEFAULT font-code-sm text-code-sm text-on-surface p-sm input-focus-border transition-colors duration-200 placeholder-outline" id="username" placeholder="user_name" type="text"/>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-xs" for="email">EMAIL</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant text-[18px]">mail</span>
<input class="w-full bg-surface-container-highest border border-outline-variant rounded-DEFAULT font-code-sm text-code-sm text-on-surface py-sm pl-xl pr-sm input-focus-border transition-colors duration-200 placeholder-outline" id="email" placeholder="admin@better-vc.local" type="email"/>
</div>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-xs flex justify-between" for="password">
<span>PASSWORD</span>
<a class="text-primary hover:text-primary-container transition-colors" href="#" id="forgotPassLink">Forgt_Pwd?</a>
</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant text-[18px]">key</span>
<input class="w-full bg-surface-container-highest border border-outline-variant rounded-DEFAULT font-code-sm text-code-sm text-on-surface py-sm pl-xl pr-sm input-focus-border transition-colors duration-200 placeholder-outline" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-label-caps text-label-caps py-sm rounded-DEFAULT mt-sm hover:bg-tertiary-container transition-colors duration-200 flex items-center justify-center gap-xs active:scale-[0.98]" type="submit">
<span id="submitText">EXECUTE_LOGIN</span>
<span class="material-symbols-outlined text-[16px]">terminal</span>
</button>
<!-- SSO / Alternative -->
<div class="mt-md pt-md border-t border-outline-variant">
<button class="w-full bg-transparent border border-outline-variant text-on-surface-variant font-label-caps text-label-caps py-sm rounded-DEFAULT hover:text-primary hover:border-primary transition-colors duration-200 flex items-center justify-center gap-xs" type="button">
<span class="material-symbols-outlined text-[16px]">integration_instructions</span>
<span>SSO_AUTH</span>
</button>
</div>
</form>
</div>
<script>
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const nameField = document.getElementById('nameField');
        const submitText = document.getElementById('submitText');
        const forgotPassLink = document.getElementById('forgotPassLink');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('tab-active');
            loginTab.classList.remove('tab-inactive', 'hover:text-on-surface');
            
            signupTab.classList.remove('tab-active');
            signupTab.classList.add('tab-inactive', 'hover:text-on-surface');

            nameField.classList.add('hidden');
            submitText.textContent = 'EXECUTE_LOGIN';
            forgotPassLink.style.display = 'block';
        });

        signupTab.addEventListener('click', () => {
            signupTab.classList.add('tab-active');
            signupTab.classList.remove('tab-inactive', 'hover:text-on-surface');
            
            loginTab.classList.remove('tab-active');
            loginTab.classList.add('tab-inactive', 'hover:text-on-surface');

            nameField.classList.remove('hidden');
            submitText.textContent = 'INIT_SIGNUP';
            forgotPassLink.style.display = 'none';
        });
    </script>
</body></html>
